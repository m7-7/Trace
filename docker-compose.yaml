services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://trace:trace@db:5432/trace
      PGHOST: db
      PGPORT: 5432
      PGUSER: trace
      PGPASSWORD: trace
      PGDATABASE: trace
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - ./uploads:/app/uploads
      # To scan local photo folders, mount them under /app/media/ then add them
      # in Trace via Add Folder using the container path (e.g. /app/media/Pictures).
      # Restart the container after adding a new volume mount.
      # Example:
      # - /home/andreas/Pictures:/app/media/Pictures
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace
      POSTGRES_DB: trace
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace -d trace"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
