services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_PATH: /app/data/trace.db
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      # To scan local photo folders in Docker, add volume mounts here and use
      # the container path when adding folders in Trace. Example:
      # - /home/andreas/Pictures:/app/media/Pictures
      # Then add /app/media/Pictures as a folder in the Trace UI.
    restart: unless-stopped
